name: s3-diag-temp
on: workflow_dispatch
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect + DNS
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          python3 -c "import os; r=os.environ.get('AWS_DEFAULT_REGION',''); print('region len:', len(r)); print('region bytes:', r.encode())"
          echo "--- getent bucket-specific ---"
          getent hosts bathroomrenovationcamberwell-101.s3.amazonaws.com || echo FAIL1
          echo "--- getent w/ region var ---"
          getent hosts "s3.${AWS_DEFAULT_REGION}.amazonaws.com" || echo FAIL2
          echo "--- python socket resolve ---"
          python3 -c "import socket; print(socket.getaddrinfo('s3.${AWS_DEFAULT_REGION}.amazonaws.com', 443))" || echo FAIL3
