name: s3-diag-temp
on: workflow_dispatch
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect SUPABASE_URL
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          python3 -c "import os; r=os.environ.get('SUPABASE_URL',''); print('len:', len(r)); print('starts_https:', r.startswith('https://')); print('host:', r.split('//')[-1].split('/')[0] if '//' in r else 'NOPROTO')"
          echo "--- getent for the actual host ---"
          H=$(python3 -c "import os; r=os.environ.get('SUPABASE_URL',''); print(r.split('//')[-1].split('/')[0])")
          getent hosts "$H" || echo FAIL
          echo "--- curl HEAD ---"
          curl -sv -m 10 "$SUPABASE_URL/rest/v1/" 2>&1 | head -15
